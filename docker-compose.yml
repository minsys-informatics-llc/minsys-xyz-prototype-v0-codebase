version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: minsys_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Persist Caddy's SSL certificates and config so you don't hit rate limits
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: